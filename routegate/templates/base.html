<!DOCTYPE html>
<html lang="en" data-theme="dark" data-chrome="flat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}routegate{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <style>
        :root {
            --bg: #1a1d21;
            --card-bg: #252830;
            --card-border: #34373e;
            --text: #e8e8e8;
            --text-muted: #9aa0a6;
            --primary: #5294e2;
            --primary-fg: #ffffff;
            --primary-hover: #3b7fd0;
            --success: #66bb6a;
            --error: #e57373;
            --warning: #ffb74d;
            --info: #64b5f6;
            --accent: #b39ddb;

            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;

            --radius: 8px;
            --border-width: 1px;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        h1 {
            color: var(--text);
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
            margin: 0 0 24px;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        h1 .title { font-family: var(--font-mono); letter-spacing: 0.5px; }
        h1 .header-controls { display: flex; gap: 10px; align-items: center; font-size: 13px; font-weight: normal; }

        a { color: var(--primary); }
        a:hover { color: var(--primary-hover); }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border: var(--border-width) solid var(--card-border);
            border-radius: var(--radius);
            margin-bottom: 18px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 12px;
        }
        .panel-title { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }

        .table-container {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            margin-top: 4px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 720px; }
        th {
            background: rgba(255, 255, 255, 0.03);
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid var(--card-border);
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        th.center, td.center { text-align: center; }
        th.right, td.right { text-align: right; }
        td {
            padding: 10px;
            border-bottom: 1px solid var(--card-border);
            font-size: 14px;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(255, 255, 255, 0.02); }

        .mono { font-family: var(--font-mono); font-size: 13px; }
        .muted { color: var(--text-muted); }

        .yes { color: var(--success); font-family: var(--font-mono); }
        .no  { color: var(--error);   font-family: var(--font-mono); }
        .dim { color: var(--text-muted); font-family: var(--font-mono); }

        .status-up      { color: var(--success); font-family: var(--font-mono); font-weight: 600; letter-spacing: 0.5px; }
        .status-down    { color: var(--error);   font-family: var(--font-mono); font-weight: 600; letter-spacing: 0.5px; }
        .status-unknown { color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.5px; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: var(--font-mono);
        }
        .badge-protected { background: rgba(255, 183, 77, 0.15); color: var(--warning); }
        .badge-bypass    { background: rgba(179, 157, 219, 0.18); color: var(--accent); }

        button, .btn {
            padding: 12px 22px;
            background: var(--primary);
            color: var(--primary-fg);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            font-family: inherit;
            transition: background 0.15s;
        }
        button:hover, .btn:hover { background: var(--primary-hover); }
        button:disabled, .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-inline {
            padding: 6px 14px;
            font-size: 13px;
            width: auto;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text);
        }
        .btn-secondary:hover { border-color: var(--primary); background: transparent; color: var(--primary); }
        .btn-danger {
            background: var(--error);
            color: #1a0808;
        }
        .btn-danger:hover { background: #ef9a9a; }
        .btn-link {
            background: transparent;
            border: none;
            color: var(--primary);
            padding: 6px 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-link:hover { color: var(--primary-hover); background: transparent; }
        .btn-link-danger { color: var(--error); }
        .btn-link-danger:hover { color: #ef9a9a; }
        .btn-link-muted { color: var(--text-muted); }
        .btn-link-muted:hover { color: var(--text); }

        .row-actions { display: flex; gap: 6px; justify-content: flex-end; }

        form .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        form .form-row { display: flex; flex-direction: column; gap: 6px; }
        form .form-row.full { grid-column: 1 / -1; }
        form label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        form input[type="text"], form select {
            padding: 10px 12px;
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        form input[type="text"]:focus, form select:focus { border-color: var(--primary); }
        form input[type="text"][readonly] {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
            cursor: not-allowed;
        }
        form .field-hint { font-size: 12px; color: var(--text-muted); }
        form .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
        form .checkbox-row input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: var(--primary);
            margin: 0;
        }
        form .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            justify-content: flex-end;
        }
        form .field-error { color: var(--error); font-size: 12px; }
        form .form-row.has-error input[type="text"] { border-color: var(--error); }

        .flash {
            padding: 10px 14px;
            margin-bottom: 14px;
            border-radius: var(--radius);
            border: 1px solid var(--card-border);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .flash-success { border-color: var(--success); color: var(--success); background: rgba(102, 187, 106, 0.08); }
        .flash-error   { border-color: var(--error);   color: var(--error);   background: rgba(229, 115, 115, 0.08); }
        .flash-info    { border-color: var(--info);    color: var(--info);    background: rgba(100, 181, 246, 0.08); }
        .flash .flash-icon { font-family: var(--font-mono); font-weight: 700; }

        .footnote { font-size: 12px; color: var(--text-muted); margin-top: 14px; }
        .footnote code { font-family: var(--font-mono); }

        .confirm-cell { display: flex; align-items: center; gap: 10px; }
        .confirm-msg { font-size: 13px; color: var(--warning); }
    </style>
</head>
<body>
    <h1>
        <span class="title">routegate</span>
        <span class="header-controls">
            {% block header_controls %}{% endblock %}
        </span>
    </h1>
    <div id="content">
        {% block content %}{% endblock %}
    </div>
    <script>
        // Auto-dismiss flashes after 5s. Run on every htmx swap so dynamically-
        // injected flashes also fade.
        function armFlashes(root) {
            (root || document).querySelectorAll('.flash[data-autodismiss]').forEach(el => {
                if (el.dataset.armed) return;
                el.dataset.armed = '1';
                setTimeout(() => { el.style.transition = 'opacity 0.4s'; el.style.opacity = '0'; }, 4500);
                setTimeout(() => el.remove(), 5000);
            });
        }
        armFlashes();
        document.body.addEventListener('htmx:afterSwap', e => armFlashes(e.target));
    </script>
</body>
</html>
